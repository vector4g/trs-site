<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Third Rail Systems OÜ">
  <defs>
    <linearGradient id="trs-silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A8ADB3"/>
      <stop offset="20%" stop-color="#D7DBDF"/>
      <stop offset="50%" stop-color="#EFF2F4"/>
      <stop offset="80%" stop-color="#C7CBD0"/>
      <stop offset="100%" stop-color="#9DA2A8"/>
    </linearGradient>
    <linearGradient id="trs-stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5347A0"/>
      <stop offset="22%" stop-color="#7A5E92"/>
      <stop offset="42%" stop-color="#C68A50"/>
      <stop offset="52%" stop-color="#E0A968"/>
      <stop offset="62%" stop-color="#C68A50"/>
      <stop offset="82%" stop-color="#6B528E"/>
      <stop offset="100%" stop-color="#2E2750"/>
    </linearGradient>
    <linearGradient id="trs-stem-mirror" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2E2750"/>
      <stop offset="18%" stop-color="#6B528E"/>
      <stop offset="38%" stop-color="#C68A50"/>
      <stop offset="48%" stop-color="#E0A968"/>
      <stop offset="58%" stop-color="#C68A50"/>
      <stop offset="78%" stop-color="#7A5E92"/>
      <stop offset="100%" stop-color="#5347A0"/>
    </linearGradient>
    <radialGradient id="trs-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="trs-cyan-glow" x="-100%" y="-50%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="20" y="40" width="160" height="135" fill="url(#trs-halo)" rx="20"/>
  <rect x="54" y="50" width="92" height="18" rx="3" fill="url(#trs-silver)"/>
  <rect x="56" y="52" width="88" height="2.4" rx="1.2" fill="#FFFFFF" opacity="0.45"/>
  <rect x="78" y="72" width="18" height="88" rx="1" fill="url(#trs-stem)"/>
  <rect x="104" y="72" width="18" height="88" rx="1" fill="url(#trs-stem-mirror)"/>
  <line x1="100" y1="68" x2="100" y2="164" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" opacity="0.28" filter="url(#trs-cyan-glow)"/>
  <line x1="100" y1="68" x2="100" y2="164" stroke="#00E5FF" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="100" y1="70" x2="100" y2="162" stroke="#E6FBFF" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
</svg>
